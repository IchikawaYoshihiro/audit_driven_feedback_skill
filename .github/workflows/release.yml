name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install pyyaml

      - name: Lint skill format (gate the release)
        run: python tools/lint_skill.py

      - name: Build install bundles
        run: |
          zip -r "audit-driven-feedback-${GITHUB_REF_NAME}.zip" audit-driven-feedback
          zip -r "assurance-audit-${GITHUB_REF_NAME}.zip" assurance-audit
          zip -r "knowledge-audit-${GITHUB_REF_NAME}.zip" knowledge-audit

      - name: Create GitHub Release with the bundles
        uses: softprops/action-gh-release@v2
        with:
          files: |
            audit-driven-feedback-${{ github.ref_name }}.zip
            assurance-audit-${{ github.ref_name }}.zip
            knowledge-audit-${{ github.ref_name }}.zip
          generate_release_notes: true
